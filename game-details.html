    <script>
        // Store game visit in localStorage for Recent Games logic
        const params = new URLSearchParams(window.location.search);
        const slugParam = params.get('slug');
        // Also try path: /games/slug
        let gameSlug = slugParam;
        if (!gameSlug) {
            const pathParts = window.location.pathname.split('/');
            const gi = pathParts.indexOf('games');
            if (gi !== -1 && pathParts[gi + 1]) gameSlug = pathParts[gi + 1];
        }
        if (gameSlug) {
            let recent = JSON.parse(localStorage.getItem('recent_games') || '[]');
            recent = recent.filter(id => id !== gameSlug);
            recent.unshift(gameSlug);
            localStorage.setItem('recent_games', JSON.stringify(recent.slice(0, 8)));
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js?v=6');
            });
        }
    </script>
