<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jetpack Escape</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/thumb.png">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="scoreDisplay">DISTANCE: 0M</div>
            
            <div id="startScreen" class="screen active">
                <h1>JETPACK ESCAPE</h1>
                <p>Tap and hold to fly up. Release to fall.</p>
                <p>Avoid the red lasers!</p>
                <button id="startBtn">IGNITE</button>
            </div>

            <div id="gameOverScreen" class="screen">
                <h1>CRASHED</h1>
                <p>FINAL DISTANCE: <span id="finalScore">0</span>M</p>
                <button id="restartBtn">RETRY</button>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
