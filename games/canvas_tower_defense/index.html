<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siege Defense | Endless Tower Defense</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Outfit:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #1a0a2e;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            -ms-touch-action: none;
        }

        #game-wrapper {
            position: relative;
            display: flex;
            gap: 0;
            max-width: 100vw;
            max-height: 100vh;
        }

        canvas {
            display: block;
            border: 2px solid #3a1f5e;
            border-radius: 8px 0 0 8px;
            cursor: pointer;
        }

        #sidebar {
            width: 200px;
            background: linear-gradient(180deg, #1e0f3a 0%, #2d1650 50%, #1e0f3a 100%);
            border: 2px solid #3a1f5e;
            border-left: none;
            border-radius: 0 8px 8px 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: #e0d0ff;
            overflow-y: auto;
        }

        .stat-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .stat-bar .label { color: #a090c0; font-size: 12px; }
        .stat-bar .value { font-weight: 700; color: #ffd700; font-size: 16px; }
        .stat-bar .value.health { color: #ff6b6b; }

        .section-title {
            font-family: 'MedievalSharp', cursive;
            font-size: 18px;
            color: #c9a0ff;
            text-align: center;
            margin: 4px 0 2px;
            text-shadow: 0 0 10px rgba(180,100,255,0.3);
        }

        .tower-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #e0d0ff;
        }
        .tower-btn:hover { background: rgba(255,255,255,0.1); border-color: #7c4dff; transform: scale(1.02); }
        .tower-btn.selected { background: rgba(124,77,255,0.2); border-color: #7c4dff; box-shadow: 0 0 12px rgba(124,77,255,0.3); }
        .tower-btn.disabled { opacity: 0.4; cursor: not-allowed; }

        .tower-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .tower-info { flex: 1; }
        .tower-info .name { font-size: 13px; font-weight: 600; }
        .tower-info .cost { font-size: 11px; color: #ffd700; }

        #wave-btn {
            margin-top: auto;
            padding: 12px;
            background: linear-gradient(135deg, #7c4dff, #536dfe);
            border: none;
            border-radius: 8px;
            color: white;
            font-family: 'MedievalSharp', cursive;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        #wave-btn:hover { transform: scale(1.03); box-shadow: 0 4px 15px rgba(124,77,255,0.4); }
        #wave-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

        #speed-btn {
            padding: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #c9a0ff;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }
        #speed-btn:hover { background: rgba(255,255,255,0.15); }

        .upgrade-panel {
            display: none;
            position: absolute;
            background: rgba(30,15,58,0.95);
            border: 2px solid #7c4dff;
            border-radius: 10px;
            padding: 12px;
            color: #e0d0ff;
            z-index: 10;
            min-width: 160px;
            backdrop-filter: blur(10px);
        }
        .upgrade-panel .title { font-family: 'MedievalSharp', cursive; font-size: 16px; color: #c9a0ff; margin-bottom: 8px; }
        .upgrade-panel .stat { font-size: 12px; margin: 3px 0; color: #a090c0; }
        .upgrade-panel .btn-row { display: flex; gap: 6px; margin-top: 8px; }
        .upgrade-panel button {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .upgrade-panel .upgrade-btn { background: #7c4dff; color: white; }
        .upgrade-panel .upgrade-btn:hover { background: #9c6fff; }
        .upgrade-panel .sell-btn { background: #ff4444; color: white; }
        .upgrade-panel .sell-btn:hover { background: #ff6666; }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            border-radius: 8px;
        }
        #game-over-screen h1 { font-family: 'MedievalSharp', cursive; font-size: 48px; color: #ff4444; margin-bottom: 10px; }
        #game-over-screen p { font-size: 18px; color: #c9a0ff; margin-bottom: 20px; }
        #game-over-screen button {
            padding: 12px 40px;
            background: #7c4dff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            font-family: 'MedievalSharp', cursive;
        }

        @media (max-width: 700px) {
            #game-wrapper { flex-direction: column; }
            #sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; border-radius: 0 0 8px 8px; border-left: 2px solid #3a1f5e; border-top: none; padding: 8px; }
            canvas { border-radius: 8px 8px 0 0; }
            .tower-btn { flex: 1; min-width: 80px; }
            .stat-bar { flex: 1; min-width: 100px; }
            .section-title { width: 100%; }
            #wave-btn { flex: 1; min-width: 120px; }
            #speed-btn { flex: 1; min-width: 80px; }
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        
        <div id="sidebar">
            <div class="stat-bar">
                <div><span class="label">Gold</span></div>
                <div class="value" id="gold-display">200</div>
            </div>
            <div class="stat-bar">
                <div><span class="label">Lives</span></div>
                <div class="value health" id="health-display">20</div>
            </div>
            <div class="stat-bar">
                <div><span class="label">Wave</span></div>
                <div class="value" id="wave-display">0</div>
            </div>

            <div class="section-title">⚔️ Towers</div>

            <div class="tower-btn" data-tower="archer" onclick="selectTower('archer')">
                <div class="tower-icon" style="background:#2d7d32;">🏹</div>
                <div class="tower-info">
                    <div class="name">Archer</div>
                    <div class="cost">💰 50</div>
                </div>
            </div>
            <div class="tower-btn" data-tower="mage" onclick="selectTower('mage')">
                <div class="tower-icon" style="background:#6a1b9a;">🔮</div>
                <div class="tower-info">
                    <div class="name">Mage</div>
                    <div class="cost">💰 100</div>
                </div>
            </div>
            <div class="tower-btn" data-tower="cannon" onclick="selectTower('cannon')">
                <div class="tower-icon" style="background:#d84315;">💣</div>
                <div class="tower-info">
                    <div class="name">Cannon</div>
                    <div class="cost">💰 150</div>
                </div>
            </div>
            <div class="tower-btn" data-tower="ice" onclick="selectTower('ice')">
                <div class="tower-icon" style="background:#0277bd;">❄️</div>
                <div class="tower-info">
                    <div class="name">Ice Tower</div>
                    <div class="cost">💰 75</div>
                </div>
            </div>

            <button id="speed-btn" onclick="toggleSpeed()">Speed: 1x</button>
            <button id="wave-btn" onclick="startWave()">⚔️ Start Wave</button>
        </div>

        <div class="upgrade-panel" id="upgrade-panel">
            <div class="title" id="panel-title">Tower</div>
            <div class="stat" id="panel-level">Level: 1</div>
            <div class="stat" id="panel-damage">Damage: 10</div>
            <div class="stat" id="panel-range">Range: 120</div>
            <div class="btn-row">
                <button class="upgrade-btn" id="panel-upgrade" onclick="upgradeTower()">⬆️ Upgrade</button>
                <button class="sell-btn" onclick="sellTower()">💰 Sell</button>
            </div>
        </div>

        <div id="game-over-screen">
            <h1>⚔️ Defeated!</h1>
            <p>You survived <span id="final-wave">0</span> waves</p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script src="siege.js"></script>
</body>
</html>
