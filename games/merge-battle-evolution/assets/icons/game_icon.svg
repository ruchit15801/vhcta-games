<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium App Icon Background -->
    <radialGradient id="bgGrad" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#e0aaff"/>
      <stop offset="40%" stop-color="#7b2cbf"/>
      <stop offset="100%" stop-color="#10002b"/>
    </radialGradient>
    
    <!-- Gold / Fire Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffea00"/>
      <stop offset="50%" stop-color="#ff9e00"/>
      <stop offset="100%" stop-color="#dc2f02"/>
    </linearGradient>

    <!-- Chrome / Steel Gradient -->
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e1dd"/>
      <stop offset="50%" stop-color="#778da9"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
    
    <!-- Drop Shadow for 3D depth -->
    <filter id="shadow3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="15" stdDeviation="10" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App Rounded Rect Base -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
    
  <!-- Inner Rim Light -->
  <rect x="5" y="5" width="502" height="502" rx="105" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="10"/>

  <!-- Magical Back Glow -->
  <circle cx="256" cy="256" r="180" fill="#9d4edd" filter="url(#glow)" opacity="0.5"/>

  <!-- Sword (Merge Battle) -->
  <path d="M 256 50 L 290 150 L 256 450 L 222 150 Z" fill="url(#steelGrad)" filter="url(#shadow3d)"/>
  
  <!-- Hilt -->
  <rect x="200" y="380" width="112" height="30" rx="10" fill="url(#goldGrad)" filter="url(#shadow3d)"/>
  <circle cx="256" cy="430" r="25" fill="#ef233c" filter="url(#glow)"/>

  <!-- Magical Orb / Egg merging with sword -->
  <circle cx="256" cy="256" r="90" fill="url(#goldGrad)" filter="url(#shadow3d)"/>
  <circle cx="210" cy="210" r="20" fill="rgba(255,255,255,0.8)" filter="url(#glow)"/> <!-- Specular Highlight -->

</svg>
