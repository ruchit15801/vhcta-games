<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#0a1c30"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.3)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Hex grid pattern -->
  <g opacity="0.06" stroke="#d4af37" stroke-width="1" fill="none">
    <polygon points="80,40 120,20 160,40 160,80 120,100 80,80"/>
    <polygon points="160,40 200,20 240,40 240,80 200,100 160,80"/>
    <polygon points="240,40 280,20 320,40 320,80 280,100 240,80"/>
    <polygon points="320,40 360,20 400,40 400,80 360,100 320,80"/>
    <polygon points="80,120 120,100 160,120 160,160 120,180 80,160"/>
    <polygon points="160,120 200,100 240,120 240,160 200,180 160,160"/>
  </g>
  <!-- Scan line -->
  <rect x="0" y="200" width="1280" height="2" fill="#d4af37" opacity="0.15"/>
  <!-- Central glow -->
  <ellipse cx="640" cy="360" rx="400" ry="300" fill="url(#glow)"/>
  <!-- Game path visualization -->
  <path d="M 100,200 L 900,200 L 900,350 L 200,350 L 200,520 L 1100,520" 
        stroke="#1e4060" stroke-width="50" fill="none" stroke-linecap="round"/>
  <path d="M 100,200 L 900,200 L 900,350 L 200,350 L 200,520 L 1100,520" 
        stroke="#28647a" stroke-width="40" fill="none" stroke-linecap="round"/>
  <!-- Enemy dots on path -->
  <circle cx="300" cy="200" r="16" fill="#ef5350" opacity="0.9"/>
  <circle cx="450" cy="200" r="20" fill="#ffd54f" opacity="0.9"/>
  <circle cx="620" cy="200" r="14" fill="#b0bec5" opacity="0.7"/>
  <circle cx="750" cy="200" r="28" fill="#8d6e63" opacity="0.9"/>
  <circle cx="900" cy="280" r="22" fill="#ff5722" opacity="0.9"/>
  <circle cx="550" cy="350" r="18" fill="#ef5350" opacity="0.8"/>
  <circle cx="340" cy="430" r="25" fill="#212121" stroke="#d4af37" stroke-width="3"/>
  <!-- Tower visualizations -->
  <!-- Tower 1 -->
  <circle cx="200" cy="140" r="30" fill="#1565c0"/>
  <circle cx="200" cy="140" r="20" fill="none" stroke="#4fc3f7" stroke-width="2.5"/>
  <circle cx="200" cy="140" r="8" fill="#4fc3f7"/>
  <!-- Tower 2 -->
  <circle cx="650" cy="140" r="30" fill="#1b5e20"/>
  <circle cx="650" cy="140" r="20" fill="none" stroke="#81c784" stroke-width="2.5"/>
  <circle cx="650" cy="140" r="8" fill="#81c784"/>
  <!-- Tower 3 -->
  <circle cx="400" cy="440" r="30" fill="#bf360c"/>
  <circle cx="400" cy="440" r="20" fill="none" stroke="#ffb74d" stroke-width="2.5"/>
  <circle cx="400" cy="440" r="8" fill="#ffb74d"/>
  <!-- Tower 4 — Void (big) -->
  <circle cx="1050" cy="430" r="38" fill="#4a148c"/>
  <circle cx="1050" cy="430" r="26" fill="none" stroke="#ce93d8" stroke-width="3"/>
  <circle cx="1050" cy="430" r="11" fill="#ce93d8"/>
  <!-- Range rings -->
  <circle cx="200" cy="140" r="90" fill="none" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <circle cx="1050" cy="430" r="150" fill="none" stroke="#ce93d8" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <!-- Projectile arcs -->
  <path d="M 200,140 Q 275,165 300,200" stroke="#4fc3f7" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 650,140 Q 700,165 750,200" stroke="#81c784" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Scan lines overlay -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#scanlines)" opacity="0.03"/>
  <!-- Title block -->
  <rect x="0" y="560" width="1280" height="160" fill="rgba(3,8,16,0.85)"/>
  <line x1="0" y1="560" x2="1280" y2="560" stroke="#d4af37" stroke-width="2" opacity="0.5"/>
  <text x="640" y="628" text-anchor="middle" font-family="'Arial Black', Arial" font-size="72" font-weight="900" fill="#d4af37" letter-spacing="15">AEGIS DEFENSE</text>
  <text x="640" y="670" text-anchor="middle" font-family="Arial" font-size="22" fill="#8a9aaa" letter-spacing="20">STRATEGIC WARFARE SYSTEM</text>
  <text x="640" y="700" text-anchor="middle" font-family="Arial" font-size="16" fill="#d4af37" opacity="0.6" letter-spacing="8">10 LEVELS • 4 TOWER TYPES • 6 ENEMY CLASSES</text>
  <!-- Corner decorations -->
  <polygon points="0,0 80,0 0,80" fill="#d4af37" opacity="0.15"/>
  <polygon points="1280,0 1200,0 1280,80" fill="#d4af37" opacity="0.15"/>
  <line x1="10" y1="0" x2="10" y2="50" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="10" x2="50" y2="10" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <line x1="1270" y1="0" x2="1270" y2="50" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <line x1="1230" y1="10" x2="1280" y2="10" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
</svg>
