<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxury Memory Game</title>
    <link rel="icon" type="image/png" href="assets/icons/icon.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="start-screen" class="glass-panel active screen-overlay">
            <img src="assets/images/thumbnail.png" id="game-thumbnail" alt="Luxury Memory Thumbnail">
            <h1 class="glow-text">LUXURY MEMORY</h1>
            <p class="subtitle">Train your mind in ultimate style</p>
            <div class="instructions">
                <h3>How to Play</h3>
                <ul>
                    <li>Tap cards to flip them.</li>
                    <li>Match pairs to clear them.</li>
                    <li>Move fast for Combo Bonuses!</li>
                </ul>
            </div>
            <button id="btn-start" class="btn-primary">START JOURNEY</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="glass-panel hidden">
            <div class="hud-item">
                <span class="label">LEVEL</span>
                <span id="txt-level" class="value glow-text">1</span>
            </div>
            <div class="hud-item">
                <span class="label">SCORE</span>
                <span id="txt-score" class="value">0</span>
            </div>
            <div class="hud-item">
                <span class="label">TIME</span>
                <span id="txt-time" class="value">0:00</span>
            </div>
            <div class="hud-item combo-meter-container">
                <span class="label">COMBO</span>
                <div class="combo-bar">
                    <div id="combo-fill"></div>
                </div>
                <span id="txt-combo" class="value">x1</span>
            </div>
            <div class="hud-item power-ups">
                <button id="btn-reveal" class="btn-powerup" title="Reveal Cards">👁️</button>
                <button id="btn-freeze" class="btn-powerup" title="Freeze Timer">❄️</button>
            </div>
            <div class="hud-item">
                <button id="btn-restart" class="btn-secondary">↺</button>
            </div>
        </div>

        <!-- Game Board -->
        <div id="game-container" class="hidden">
            <div id="card-grid"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="glass-panel hidden screen-overlay">
            <h1 id="result-title" class="glow-text">LEVEL CLEAR</h1>
            <div class="stars" id="result-stars">⭐⭐⭐</div>
            <div class="stats">
                <p>Score: <span id="res-score" class="value">0</span></p>
                <p>Time: <span id="res-time" class="value">0:00</span></p>
                <p>Accuracy: <span id="res-accuracy" class="value">100%</span></p>
            </div>
            <button id="btn-next" class="btn-primary">CONTINUE</button>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
