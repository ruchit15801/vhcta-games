<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Devour Hole 3D</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
    <meta property="og:image" content="assets/images/thumbnail.svg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Main Game Canvas -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- Background Layer to give 3D illusion outside playable bounds if needed -->
        <div id="bg-overlay"></div>

        <!-- HUD: Heads Up Display -->
        <div id="hud" class="hidden">
            <div class="hud-top">
                <div class="hud-item score-box">
                    <span class="label">SCORE</span>
                    <span id="score">0</span>
                </div>
                <div class="hud-item level-box">
                    <span class="label">LEVEL</span>
                    <span id="level">1</span>
                </div>
                <div class="hud-item time-box">
                    <div class="timer-ring">
                        <svg width="60" height="60">
                            <circle class="ring-bg" cx="30" cy="30" r="26"></circle>
                            <circle class="ring-progress" id="timer-progress" cx="30" cy="30" r="26"></circle>
                        </svg>
                        <span id="time">60</span>
                    </div>
                </div>
            </div>
            
            <div class="hud-bottom">
                <div class="size-indicator">
                    <span class="label">SIZE</span>
                    <div class="progress-bar">
                        <div id="size-progress"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu" class="ui-panel">
            <div class="panel-content">
                <div class="game-logo">
                    <img src="assets/icons/icon.svg" width="100" height="100" style="border-radius:24px; margin-bottom:15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
                    <h1>DEVOUR<br><span>CITY HOLE 3D</span></h1>
                </div>
                <p class="subtitle">Swallow the world. Grow bigger.</p>
                <div class="tutorial-box">
                    <div class="tut-icon">👆</div>
                    <p>Drag to move the hole</p>
                    <div class="tut-icon">🍎🚙🏗️</div>
                    <p>Eat small objects to grow!</p>
                </div>
                <button id="btn-start" class="btn-primary">START GAME</button>
            </div>
        </div>

        <!-- Level Complete Screen -->
        <div id="level-complete" class="ui-panel hidden">
            <div class="panel-content glass-effect">
                <h2 class="title-glow">LEVEL CLEARED!</h2>
                <div class="stats-row">
                    <div class="stat">
                        <span class="label">SCORE</span>
                        <span id="level-score" class="val">0</span>
                    </div>
                    <div class="stat">
                        <span class="label">NEW SIZE</span>
                        <span id="level-size" class="val">Massive!</span>
                    </div>
                </div>
                <p class="hint">Watch out! The city is getting bigger.</p>
                <button id="btn-next" class="btn-primary">NEXT LEVEL</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="ui-panel hidden">
            <div class="panel-content glass-effect red-glow">
                <h2>TIME'S UP!</h2>
                <div class="stats-row">
                    <div class="stat">
                        <span class="label">FINAL SCORE</span>
                        <span id="final-score" class="val">0</span>
                    </div>
                    <div class="stat">
                        <span class="label">BEST</span>
                        <span id="best-score" class="val">0</span>
                    </div>
                </div>
                <button id="btn-restart" class="btn-primary">PLAY AGAIN</button>
            </div>
        </div>

        <!-- Pause / Options -->
        <button id="btn-sound" class="sound-toggle">🔊</button>
    </div>

    <!-- Scripts -->
    <script src="js/script.js"></script>
</body>
</html>
