<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141e30"/>
      <stop offset="100%" stop-color="#243b55"/>
    </linearGradient>
    <radialGradient id="holeBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="60%" stop-color="#020202"/>
      <stop offset="90%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="rgba(0, 229, 255, 0)"/>
    </radialGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- City Grid Lines (Perspective Illusion) -->
  <g stroke="rgba(255, 255, 255, 0.05)" stroke-width="2">
    <path d="M 0 360 L 1280 360" />
    <path d="M 0 460 L 1280 460" />
    <path d="M 0 560 L 1280 560" />
    <path d="M 0 660 L 1280 660" />
    
    <path d="M 640 0 L 640 720" />
    <path d="M 320 0 L 0 720" />
    <path d="M 480 0 L 320 720" />
    <path d="M 800 0 L 960 720" />
    <path d="M 960 0 L 1280 720" />
  </g>

  <!-- Giant Black Hole -->
  <circle cx="640" cy="400" r="250" fill="url(#holeBg)" filter="url(#neonGlow)"/>

  <!-- Swirling Debris -->
  <g transform="translate(640, 400)">
    <!-- Car -->
    <g transform="rotate(30) translate(150, 0) scale(1.5)">
      <rect x="-30" y="-15" width="60" height="30" fill="#ff3366" rx="5" filter="url(#neonGlow)"/>
      <rect x="-10" y="-10" width="20" height="20" fill="#fff"/>
    </g>
    <!-- Tree -->
    <g transform="rotate(120) translate(180, 0) scale(1.5)">
      <circle cx="0" cy="0" r="20" fill="#4caf50"/>
      <circle cx="-5" cy="-5" r="10" fill="#a5d6a7"/>
    </g>
    <!-- Building -->
    <g transform="rotate(220) translate(200, 0) scale(1.2)">
      <rect x="-40" y="-80" width="80" height="160" fill="#00e5ff" rx="4"/>
      <rect x="-30" y="-70" width="15" height="20" fill="#fff"/>
      <rect x="0" y="-70" width="15" height="20" fill="#fff"/>
      <rect x="-30" y="-30" width="15" height="20" fill="#fff"/>
      <rect x="0" y="-30" width="15" height="20" fill="#fff"/>
    </g>
    <!-- Little Debris Dots -->
    <circle cx="100" cy="50" r="5" fill="#fff" />
    <circle cx="-120" cy="80" r="8" fill="#ffcc00" />
    <circle cx="80" cy="-150" r="6" fill="#00e5ff" />
  </g>

  <!-- Title Text -->
  <text x="640" y="150" font-family="'Outfit', sans-serif" font-weight="900" font-size="80" fill="#ffffff" text-anchor="middle" filter="drop-shadow(0px 10px 10px rgba(0,0,0,0.8))">
    CITY DEVOUR HOLE 3D
  </text>
  <text x="640" y="210" font-family="'Outfit', sans-serif" font-weight="700" font-size="30" fill="#00e5ff" text-anchor="middle" letter-spacing="10">
    SWALLOW THE WORLD
  </text>
</svg>
