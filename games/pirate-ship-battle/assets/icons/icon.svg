<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1ba"/>
      <stop offset="30%" stop-color="#ffd700"/>
      <stop offset="70%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8b6508"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2530"/>
      <stop offset="100%" stop-color="#050a10"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <g filter="url(#shadow)">
    <!-- Crossed Cutlasses -->
    <path d="M 120 400 L 400 120 L 420 140 L 140 420 Z" fill="url(#gold)"/>
    <path d="M 120 120 L 400 400 L 420 380 L 140 100 Z" fill="url(#gold)"/>
    <circle cx="110" cy="410" r="30" fill="url(#gold)"/>
    <circle cx="410" cy="410" r="30" fill="url(#gold)"/>

    <!-- Ship Wheel Background -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="#3e2723" stroke-width="20"/>
    <circle cx="256" cy="256" r="120" fill="none" stroke="url(#gold)" stroke-width="10"/>

    <!-- Pirate Skull -->
    <path d="M 176 226 C 176 170, 216 136, 256 136 C 296 136, 336 170, 336 226 C 336 276, 306 296, 286 336 L 226 336 C 206 296, 176 276, 176 226 Z" fill="#e0e0e0"/>
    
    <!-- Eyes -->
    <circle cx="216" cy="226" r="25" fill="#111"/>
    <circle cx="296" cy="226" r="25" fill="#111"/>
    
    <!-- Glowing Eye -->
    <circle cx="216" cy="226" r="8" fill="#ff2200" filter="url(#glow)"/>

    <!-- Nose -->
    <path d="M 256 256 L 246 286 L 266 286 Z" fill="#111"/>

    <!-- Teeth -->
    <rect x="236" y="336" width="40" height="20" fill="#111"/>
    <rect x="238" y="338" width="6" height="16" fill="#e0e0e0"/>
    <rect x="248" y="338" width="6" height="16" fill="#e0e0e0"/>
    <rect x="258" y="338" width="6" height="16" fill="#e0e0e0"/>
    <rect x="268" y="338" width="6" height="16" fill="url(#gold)"/>
  </g>
</svg>
