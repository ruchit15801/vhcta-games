        <circle cx="80" cy="115" r="40" fill="#e74c3c"/>
    </g>
    
    <g filter="url(#shadow)" transform="translate(200, 150) rotate(10)">
        <rect width="180" height="260" fill="#2c3e50" rx="15" stroke="#d4af37" stroke-width="10"/>
        <rect x="15" y="15" width="150" height="230" fill="#1a252f" rx="5"/>
        <path d="M90 60 L120 180 L60 180 Z" fill="#3498db"/>
        <path d="M50 40 L130 40 L90 102 Z" fill="#9b59b6"/>
    </g>
    
    <path d="M256 50 L270 400 L242 400 Z" fill="#ecf0f1" filter="url(#shadow)"/>
    <path d="M220 380 L292 380 L292 410 L220 410 Z" fill="#d4af37"/>
    <circle cx="256" cy="395" r="8" fill="#e74c3c"/>
