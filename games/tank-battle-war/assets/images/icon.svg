<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3b2a" />
      <stop offset="100%" stop-color="#0b0c10" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="100" fill="url(#bgGlow)"/>
  <rect width="492" height="492" x="10" y="10" rx="90" fill="none" stroke="#45a29e" stroke-width="8" opacity="0.8" filter="url(#neonGlow)"/>
  
  <!-- Tank Tracks -->
  <rect x="120" y="300" width="272" height="60" rx="10" fill="#111" filter="url(#shadow)"/>
  <!-- Track Wheels -->
  <circle cx="150" cy="330" r="20" fill="#333" stroke="#555" stroke-width="4"/>
  <circle cx="200" cy="330" r="20" fill="#333" stroke="#555" stroke-width="4"/>
  <circle cx="250" cy="330" r="20" fill="#333" stroke="#555" stroke-width="4"/>
  <circle cx="300" cy="330" r="20" fill="#333" stroke="#555" stroke-width="4"/>
  <circle cx="350" cy="330" r="20" fill="#333" stroke="#555" stroke-width="4"/>

  <!-- Hull -->
  <polygon points="140,300 100,240 412,240 372,300" fill="#3a5a3a" filter="url(#shadow)"/>
  <polygon points="120,240 180,180 332,180 392,240" fill="#4a6b4a"/>

  <!-- Turret Base -->
  <path d="M 210 180 Q 256 140 302 180" fill="#2a3b2a" filter="url(#shadow)"/>
  
  <!-- Gun Barrel -->
  <rect x="236" y="80" width="40" height="100" fill="#555" filter="url(#shadow)"/>
  <rect x="226" y="60" width="60" height="20" fill="#222"/>

  <!-- Muzzle Flash Element -->
  <polygon points="256,0 236,40 276,40" fill="#ffcc00" filter="url(#neonGlow)"/>
  <circle cx="256" cy="40" r="20" fill="#ff4400" filter="url(#neonGlow)"/>
</svg>
