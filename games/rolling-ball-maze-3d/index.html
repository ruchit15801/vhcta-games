<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rolling Ball Maze 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/thumb.png">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="levelDisplay">LEVEL: 1</div>
            
            <div id="startScreen" class="screen active">
                <h1>NEON MAZE</h1>
                <p>Tilt device or drag mouse to roll the ball to the exit.</p>
                <button id="startBtn">ENTER MAZE</button>
            </div>

            <div id="gameOverScreen" class="screen">
                <h1>LEVEL CLEARED!</h1>
                <button id="nextBtn">NEXT LEVEL</button>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
