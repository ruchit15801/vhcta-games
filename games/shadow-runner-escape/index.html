<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Runner Escape</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/thumb.png">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="scoreDisplay">SCORE: 0</div>
            
            <div id="startScreen" class="screen active">
                <h1>SHADOW RUNNER</h1>
                <p>Tap or Press Space to Jump</p>
                <p>Double Tap/Space to Double Jump</p>
                <button id="startBtn">START SYSTEM</button>
            </div>

            <div id="gameOverScreen" class="screen">
                <h1>SYSTEM FAILURE</h1>
                <p>FINAL SCORE: <span id="finalScore">0</span></p>
                <button id="restartBtn">REBOOT</button>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
